<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>RTC PR Release Timeline</title>
		<link rel="stylesheet" href="./styles.css" />
	</head>
	<body>
		<main class="shell">
			<header class="topbar">
				<div>
					<p class="eyebrow">WordPress/gutenberg</p>
					<h1>RTC PR release timeline</h1>
				</div>
				<div class="meta" id="meta"></div>
			</header>

			<section class="controls" aria-label="Timeline controls">
				<label class="field">
					<span>Search</span>
					<input id="search" type="search" placeholder="PR, title, release" />
				</label>
				<label class="field">
					<span>Window</span>
					<select id="window">
						<option value="all">All</option>
						<option value="past-90" selected>Past 90 days</option>
						<option value="future">Upcoming VIP dates</option>
					</select>
				</label>
				<label class="toggle">
					<input id="projectedOnly" type="checkbox" />
					<span>Projected VIP only</span>
				</label>
			</section>

			<section class="summary" id="summary" aria-label="Summary"></section>
			<section class="channels" id="channels" aria-label="Current VIP channels"></section>
			<section class="deployment-section" aria-labelledby="deployment-heading">
				<div class="deployment-section-header">
					<div>
						<p class="eyebrow">Independent of PR timelines · Hover markers for details</p>
						<h2 id="deployment-heading">VIP deployment history</h2>
					</div>
					<label class="field deployment-filter">
						<span>Stage</span>
						<select id="deployment-stage">
							<option value="all">All deployments</option>
							<option value="staging">Staging</option>
							<option value="production">Production</option>
						</select>
					</label>
				</div>
				<div
					class="deployment-list"
					id="deployment-history"
					aria-label="VIP deployment releases"
				></div>
			</section>

			<section class="legend" aria-label="Legend">
				<span><i class="marker merge"></i>Merged</span>
				<span><i class="marker rc"></i>Gutenberg RC</span>
				<span><i class="marker ga"></i>Gutenberg GA</span>
				<span><i class="marker staging"></i>VIP staging (actual)</span>
				<span><i class="marker production"></i>VIP production (actual)</span>
				<span><i class="line projected"></i>Projected</span>
			</section>

			<section class="timeline-wrap">
				<div class="axis" id="axis"></div>
				<div class="timeline" id="timeline"></div>
			</section>
		</main>
		<script type="module" src="./app.js"></script>
	</body>
</html>
