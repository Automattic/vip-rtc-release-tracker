name: Generate and deploy timeline

on:
  push:
    branches:
      - main
  workflow_dispatch:
  schedule:
    - cron: '0 * * * *'

permissions:
  contents: read
  id-token: write
  pages: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  generate:
    name: Generate site
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Run tests
        run: npm test

      - name: Generate timeline data
        run: npm run refresh
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GUTENBERG_DIR: /tmp/no-local-gutenberg-checkout

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Build Pages artifact directory
        run: |
          mkdir -p _site/data
          asset_hash=$(shasum -a 256 app.js render-helpers.mjs styles.css | shasum -a 256 | cut -c1-12)
          cp render-helpers.mjs "_site/render-helpers.${asset_hash}.mjs"
          cp styles.css "_site/styles.${asset_hash}.css"
          sed "s#\\./render-helpers\\.mjs#./render-helpers.${asset_hash}.mjs#" app.js > "_site/app.${asset_hash}.js"
          sed \
            -e "s#\\./styles\\.css#./styles.${asset_hash}.css#" \
            -e "s#\\./app\\.js#./app.${asset_hash}.js#" \
            index.html > _site/index.html
          cp data/pr-release-timeline.json _site/data/

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    name: Deploy to GitHub Pages
    needs: generate
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy site
        id: deployment
        uses: actions/deploy-pages@v4
